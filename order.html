<meta charset="UTF-8">

</head>

<header>
<div class="logo-container">
<img src="logo.png" class="logo">
<h2>MPT</h2>
</div>
<nav>
<a href="index.html">Главная</a>

<section class="container">
<h2 class="section-title">Форма заказа PCB / микросхем</h2>
<form>
<label>Имя</label>
<input type="text" placeholder="Ваше имя">
<label>Email</label>
<input type="email" placeholder="example@mail.com">
<label>Телефон</label>
<input type="tel" placeholder="+7 ...">
<label>Описание проекта</label>
<textarea rows="4" placeholder="Опишите проект"></textarea>
<label>Размер платы (мм)</label>
<input type="text" placeholder="Например 50x50">
<label>Количество плат</label>
<input type="number" placeholder="1">
<label>Слои</label>
<select>
<option>1</option>
<option>2</option>
<option>4</option>
<option>6</option>
</select>
<label>Файлы Gerber</label>
<input type="file">
<button>Отправить заказ</button>
</form>

  <a href="payment.html" class="btn">Перейти к оплате</a>

<div class="container" style="margin-top:40px;">
<h3>Процесс заказа</h3>
<ul>
<li>1. Загрузите файлы дизайна</li>
<li>2. Техническая проверка</li>
<li>3. Производство</li>
<li>4. Контроль качества</li>
<li>5. Доставка</li>
</ul>
</div>

<footer>
